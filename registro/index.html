<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Asistencia</title>
  <style>
    :root {
      --primary: #dc2626;
      --primary-hover: #b91c1c;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    /* Mejora global para que el padding no desborde los elementos */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px 12px; /* Margen externo reducido para móviles */
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px; /* Padding interno uniforme */
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      margin: auto;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      text-transform: uppercase;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 24px;
      text-align: center;
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
      width: 100%; /* Asegura que el campo ocupe todo el ancho */
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      color: var(--text-muted);
    }

    input, select {
      width: 100%;
      display: block;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background-color: #fff;
      text-transform: uppercase;
    }

    input::placeholder {
      text-transform: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .signature-container {
      position: relative;
      background: #fff;
      border: 2px dashed var(--border);
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 180px;
      touch-action: none;
      cursor: crosshair;
    }

    .signature-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      text-decoration: underline;
      text-transform: uppercase;
    }

    .submit-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .submit-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      display: none;
      text-transform: uppercase;
      font-size: 12px;
    }

    .msg.visible { display: block; }
    .msg.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .msg.loading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

  </style>
</head>
<body>

  <div class="container">
    <h1>Asistencia Capacitación</h1>
    <p>Complete sus datos en mayúsculas y firme.</p>

    <form id="attendanceForm">
      <div class="field">
        <label for="lastName">Apellidos</label>
        <input type="text" id="lastName" name="lastName" placeholder="EJ. PÉREZ GARCÍA" required />
      </div>

      <div class="field">
        <label for="firstName">Nombres</label>
        <input type="text" id="firstName" name="firstName" placeholder="EJ. JUAN ALBERTO" required />
      </div>

      <div class="field">
        <label for="dni">DNI / CE</label>
        <input 
          type="tel" 
          id="dni" 
          name="dni" 
          inputmode="numeric"
          pattern="\d*"
          maxlength="10" 
          placeholder="SOLO NÚMEROS" 
          required 
        />
      </div>

      <div class="field">
        <label for="company">Empresa</label>
        <select id="company" name="company" required>
          <option value="">CARGANDO EMPRESAS...</option>
        </select>
      </div>

      <div class="field">
        <label for="position">Puesto / Cargo</label>
        <select id="position" name="position" required>
          <option value="">CARGANDO CARGOS...</option>
        </select>
      </div>

      <div class="field">
        <label>Firma Digital</label>
        <div class="signature-container">
          <canvas id="signatureCanvas"></canvas>
        </div>
        <div class="signature-actions">
          <button type="button" class="clear-btn" id="clearSignature">LIMPIAR TABLERO</button>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">ENVIAR REGISTRO</button>
      <div id="message" class="msg"></div>
    </form>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6a-uNR1mWNqF68J7flNlpl4ijbaoTy2fDlbVlC1J7cyRYXEW83qnWQgF6TiqAY1q4dg/exec";

    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    const form = document.getElementById("attendanceForm");
    const clearBtn = document.getElementById("clearSignature");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const companySelect = document.getElementById("company");
    const positionSelect = document.getElementById("position");
    const dniInput = document.getElementById("dni");

    let drawing = false;
    let hasSignature = false;

    dniInput.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '');
    });

    function initCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.scale(ratio, ratio);
      
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#0f172a";
      
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, rect.width, rect.height);
    }

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
      drawing = true;
      const pos = getPointerPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      if (e.cancelable) e.preventDefault();
    }

    function draw(e) {
      if (!drawing) return;
      const pos = getPointerPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      hasSignature = true;
      if (e.cancelable) e.preventDefault();
    }

    function stopDrawing() {
      drawing = false;
    }

    function clearSignature() {
      const rect = canvas.getBoundingClientRect();
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, rect.width, rect.height);
      hasSignature = false;
    }

    function showStatus(text, type) {
      message.textContent = text;
      message.className = `msg visible ${type}`;
    }

    function fillSelect(select, items, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>`;
      items.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.toUpperCase();
        opt.textContent = item.toUpperCase();
        select.appendChild(opt);
      });
    }

    async function apiCall(payload) {
      const response = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    async function loadData() {
      try {
        const res = await apiCall({ action: "bootstrap" });
        if (res.ok) {
          fillSelect(companySelect, res.empresas || [], "SELECCIONE EMPRESA");
          fillSelect(positionSelect, res.cargos || [], "SELECCIONE PUESTO");
        } else {
          throw new Error(res.error);
        }
      } catch (err) {
        showStatus("ERROR AL CARGAR DATOS.", "error");
      }
    }

    function getSignatureImage() {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = 400;
      tempCanvas.height = 150;
      const tCtx = tempCanvas.getContext("2d");
      tCtx.fillStyle = "#ffffff";
      tCtx.fillRect(0, 0, 400, 150);
      tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
      return tempCanvas.toDataURL("image/jpeg", 0.7);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const dniVal = dniInput.value.trim();
      if (dniVal.length < 8 || dniVal.length > 10) {
        showStatus("DNI DEBE TENER 8-10 DÍGITOS.", "error");
        return;
      }
      if (!hasSignature) {
        showStatus("LA FIRMA ES OBLIGATORIA.", "error");
        return;
      }

      submitBtn.disabled = true;
      showStatus("ENVIANDO...", "loading");

      const payload = {
        action: "createAttendance",
        lastName: document.getElementById("lastName").value.trim().toUpperCase(),
        firstName: document.getElementById("firstName").value.trim().toUpperCase(),
        dni: dniVal,
        company: companySelect.value.toUpperCase(),
        position: positionSelect.value.toUpperCase(),
        signatureBase64: getSignatureImage()
      };

      try {
        const result = await apiCall(payload);
        if (result.ok) {
          showStatus("REGISTRADO CON ÉXITO.", "success");
          form.reset();
          clearSignature();
          setTimeout(() => message.className = "msg", 5000);
        } else {
          throw new Error(result.error);
        }
      } catch (err) {
        showStatus("ERROR: " + err.message.toUpperCase(), "error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", clearSignature);
    canvas.addEventListener("mousedown", startDrawing);
    window.addEventListener("mousemove", draw);
    window.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("touchstart", startDrawing, { passive: false });
    canvas.addEventListener("touchmove", draw, { passive: false });
    canvas.addEventListener("touchend", stopDrawing);

    window.addEventListener("load", () => {
      initCanvas();
      loadData();
    });

    window.addEventListener("resize", () => {
      initCanvas();
    });
  </script>
</body>
</html>
